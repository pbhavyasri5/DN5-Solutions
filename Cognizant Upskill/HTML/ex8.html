<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Saving User Preferences</title>
</head>

<body>

    <h1>Event Preference</h1>

    <label>Select Event Type:</label>

    <select id="eventType" onchange="savePreference()">

        <option value="">Choose Event</option>
        <option value="Music Festival">Music Festival</option>
        <option value="Sports Meet">Sports Meet</option>
        <option value="Food Carnival">Food Carnival</option>

    </select>

    <br><br>

    <button onclick="clearPreferences()">
        Clear Preferences
    </button>

    <script>

        function savePreference() {

            let selectedEvent =
                document.getElementById("eventType").value;

            localStorage.setItem(
                "preferredEvent",
                selectedEvent
            );

            sessionStorage.setItem(
                "tempEvent",
                selectedEvent
            );

        }

        window.onload = function() {

            let savedEvent =
                localStorage.getItem("preferredEvent");

            if(savedEvent) {

                document.getElementById("eventType").value =
                    savedEvent;

            }

        }

        function clearPreferences() {

            localStorage.clear();

            sessionStorage.clear();

            alert("Preferences Cleared");

        }

    </script>

</body>

</html>
