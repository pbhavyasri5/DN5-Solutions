<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Welcome Message with Styling</title>

    <style>

        #welcomeBanner {
            background-color: blue;
            color: white;
            padding: 20px;
        }

        .highlight {
            background-color: rgb(175, 84, 236);
        }

    </style>

</head>

<body>

    <div id="welcomeBanner">
        <h1>Welcome User!</h1>

        <p class="highlight">
            Enjoy our community events and activities.
        </p>

        <p>
            Special Offer:
            <span style="color:red; font-weight:bold;">
                Free Event Registration Today!
            </span>
        </p>
    </div>

</body>

</html>
