<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Video Invite</title>
</head>

<body>

    <h1>Community Event Promo Video</h1>

    <video width="500"
           controls
           oncanplay="videoReady()">

        <source src="https://www.youtube.com/watch?v=TyippuC-Rt0"
                type="video/mp4">

    </video>

    <p id="message"></p>

    <script>

        function videoReady() {

            document.getElementById("message").innerHTML =
                "Video ready to play";

        }

        window.onbeforeunload = function() {

            return "You have unfinished work. Are you sure you want to leave?";

        }

    </script>

</body>

</html>
