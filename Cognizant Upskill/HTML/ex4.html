<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Image Gallery</title>

    <style>

        .imageStyle {
            border: 3px solid black;
            width: 200px;
            height: 150px;
        }

        table {
            border-collapse: collapse;
        }

        td {
            padding: 10px;
            text-align: center;
        }

    </style>

</head>

<body>

    <h1>Community Event Gallery</h1>

    <table border="1">

        <tr>

            <td>
                <img src="music-event.jpg"
                     alt="Music Event"
                     title="Music Event"
                     class="imageStyle">

                <p>Music Festival</p>
            </td>

            <td>
                <img src="food-event.jpg"
                     alt="Food Event"
                     title="Food Event"
                     class="imageStyle">

                <p>Food Carnival</p>
            </td>

            <td>
                <img src="dance-event.jpg"
                     alt="Dance Event"
                     title="Dance Event"
                     class="imageStyle">

                <p>Dance Program</p>
            </td>

        </tr>

        <tr>

            <td>
                <img src="sports-event.jpg"
                     alt="Sports Event"
                     title="Sports Event"
                     class="imageStyle">

                <p>Sports Meet</p>
            </td>

            <td>
                <img src="art-event.jpg"
                     alt="Art Event"
                     title="Art Event"
                     class="imageStyle">

                <p>Art Exhibition</p>
            </td>

            <td>
                <img src="book-event.jpg"
                     alt="Book Event"
                     title="Book Event"
                     class="imageStyle">

                <p>Book Fair</p>
            </td>

        </tr>

    </table>

</body>

</html>
